# COMMANDsentry — Netlify deploy config
# ───────────────────────────────────────
# Netlify publishes the static dashboard from web/ on every push to main.
# The build step re-runs sync-data.sh so any newly-committed asset JSON
# under data/assets/ gets copied into web/data/ before publish.

[build]
  base      = "."
  command   = "bash web/sync-data.sh"
  publish   = "web"
  functions = "netlify/functions"

# Friendly URL alias: /api/add-target → /.netlify/functions/add-target
[[redirects]]
  from   = "/api/add-target"
  to     = "/.netlify/functions/add-target"
  status = 200
  force  = true

# Friendly URL alias: /api/scan-status → /.netlify/functions/scan-status
[[redirects]]
  from   = "/api/scan-status"
  to     = "/.netlify/functions/scan-status"
  status = 200
  force  = true

# Friendly URL alias: /api/bulk-add-targets → /.netlify/functions/bulk-add-targets
[[redirects]]
  from   = "/api/bulk-add-targets"
  to     = "/.netlify/functions/bulk-add-targets"
  status = 200
  force  = true

# Lock down basics for an internal security tool.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# JSON data files: no caching, the dashboard always reads fresh.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Static CSS/JS/fonts: aggressive caching since they rarely change.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# 404 → home (the SPA only has one HTML file)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

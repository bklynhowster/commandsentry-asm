version: 2
defaults:
  schedule: nightly
  rate_limit: normal
  notify_on:
    - critical
    - high
  retain_history_days: 365
targets:
  - id: commandcompanies
    type: apex
    value: commandcompanies.com
    scope_verified: true
    owner: command_digital
    tags:
      - production
      - public-facing
      - corporate
    notes: Replaces commanddigital.com (which is no longer used by the org).
  - id: unimacgraphics
    type: apex
    value: unimacgraphics.com
    scope_verified: true
    owner: command_digital
    tags:
      - production
      - subsidiary
      - public-facing
    notes: Pressable shared hosting.
    rate_limit: gentle
  - id: commandcommcentral
    type: apex
    value: commandcommcentral.com
    scope_verified: true
    owner: command_digital
    tags:
      - production
      - internal-app
    notes: .NET Core 8 + IIS, FortiGate WAF, hosted by SCI. Includes test subdomain.
    rate_limit: gentle
  - id: sciimage
    type: apex
    value: sciimage.com
    scope_verified: true
    owner: command_digital
    tags: []
    notes: ftp.sciimage.com is discovered as a subdomain (was a separate target until 2026-05-11).

name: ASM Discover

# COMMANDsentry — scheduled discovery workflow.
# Runs the lean ASM tool stack against every enabled target in data/targets.yml
# and commits the resulting asset JSON back to the repo. Netlify auto-deploys
# the dashboard from those committed files (Module 5).

on:
  # Every 6 hours. Each target's own `schedule:` field can refine cadence later.
  schedule:
    - cron: '0 */6 * * *'

  # Manual trigger — gives a "Run workflow" button in the GitHub UI.
  workflow_dispatch:
    inputs:
      target:
        description: 'Target ID to scan (or "all")'
        required: false
        default: 'all'
        type: string

  # Re-scan when targets.yml changes — adding a new target triggers a scan.
  push:
    branches: [main]
    paths:
      - 'data/targets.yml'
      - '.github/workflows/asm-discover.yml'
      - 'scanner/**'

# Need write access to commit scan results back, and actions:write to chain
# the deploy-netlify workflow afterwards (GITHUB_TOKEN commits don't auto-trigger
# other workflows by default, so we explicitly fire the deploy).
permissions:
  contents: write
  actions:  write

# Don't pile up overlapping scans. A new run cancels the previous queued one.
concurrency:
  group: asm-discover
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 90       # well under GH's 6h ceiling

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history for git operations
          fetch-depth: 0

      - name: Configure git identity (for auto-commit)
        run: |
          git config user.name  "commandsentry-bot"
          git config user.email "commandsentry-bot@users.noreply.github.com"

      - name: Set up Go (required for ProjectDiscovery tools)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Go binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin
            ~/.commandsentry
          key: ${{ runner.os }}-asm-tools-${{ hashFiles('scanner/install-tools.sh') }}
          restore-keys: |
            ${{ runner.os }}-asm-tools-

      - name: Install ASM tool stack
        run: |
          chmod +x scanner/install-tools.sh
          scanner/install-tools.sh --platform ubuntu

      - name: Verify tools installed
        run: |
          for t in subfinder dnsx httpx naabu fingerprintx nuclei wafw00f whois jq yq python3; do
            if ! command -v "$t" >/dev/null 2>&1; then
              echo "::error::Required tool not found: $t"
              exit 1
            fi
          done
          echo "All tools present."

      - name: Determine targets to scan
        id: targets
        run: |
          if [[ ! -f data/targets.yml ]]; then
            echo "::error::data/targets.yml is missing from the repo. Either commit it, or rename targets.yml.example."
            exit 1
          fi

          INPUT_TARGET="${{ github.event.inputs.target }}"
          if [[ -z "$INPUT_TARGET" || "$INPUT_TARGET" == "all" ]]; then
            echo "mode=all" >> "$GITHUB_OUTPUT"
            yq '.targets[] | select(.enabled != false) | .id' data/targets.yml | tr -d '"' | head -50 > /tmp/scan_list
          else
            echo "mode=single" >> "$GITHUB_OUTPUT"
            echo "$INPUT_TARGET" > /tmp/scan_list
          fi

          if [[ ! -s /tmp/scan_list ]]; then
            echo "::error::No enabled targets found in data/targets.yml — workflow has nothing to scan."
            exit 1
          fi

          echo "Targets queued for scan:"
          cat /tmp/scan_list

      - name: Run ASM discovery
        # NO errexit — phases run independently.
        # CRITICAL: redirect /dev/null into the scanner. Otherwise it inherits
        # stdin from this loop (bound to /tmp/scan_list), and any subprocess
        # inside (testssl.sh, wafw00f, etc.) that reads stdin will consume the
        # rest of our target list, killing the loop after iteration 1.
        shell: bash {0}
        run: |
          chmod +x scanner/asm-discover.sh
          while IFS= read -r tid; do
            if [[ -z "$tid" ]]; then continue; fi
            echo "::group::Scan target: $tid"
            scanner/asm-discover.sh "$tid" </dev/null || echo "::warning::Target $tid had non-zero exit"
            echo "::endgroup::"
          done < /tmp/scan_list

      - name: Sync dashboard data
        run: |
          chmod +x web/sync-data.sh
          web/sync-data.sh

      - name: Commit scan results
        # No errexit so we can handle push race conditions cleanly.
        # Strategy: our just-scanned JSON is authoritative — older data on
        # main is stale by definition. On push race, soft-reset to origin/main
        # and re-commit our changes on top (effectively "always-win").
        shell: bash {0}
        run: |
          set -uo pipefail

          git add data/assets/ web/data/ || true
          git reset HEAD -- 'data/raw/**' 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          # Stash the changes so we can always re-stage them on top of latest main
          git stash push --staged --keep-index --message "asm-scan-results-staging" || true
          # Bring them back into the index
          git stash pop 2>/dev/null || true
          git add data/assets/ web/data/

          CHANGED=$(git diff --staged --name-only | grep -E '^data/assets/.*\.json$' | wc -l | tr -d ' ')
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          MSG="asm-scan: ${CHANGED} asset(s) updated · ${TIMESTAMP}"

          for attempt in 1 2 3; do
            # Make the commit (or amend on retry attempts)
            if [ "$attempt" -eq 1 ]; then
              git commit -m "$MSG" \
                         -m "Triggered by: ${{ github.event_name }}" \
                         -m "Workflow run: ${{ github.run_id }}"
            fi

            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi

            echo "Push rejected on attempt $attempt — soft-resetting to origin/main and re-applying"
            git fetch origin main
            # Soft-reset: HEAD moves to origin/main, but our scan data stays staged
            git reset --soft origin/main
            git add data/assets/ web/data/

            if git diff --staged --quiet; then
              echo "No changes left to commit after soft-reset (concurrent scan covered it)."
              exit 0
            fi

            # Re-create the commit on top of new origin/main
            git commit -m "$MSG" \
                       -m "Triggered by: ${{ github.event_name }}" \
                       -m "Workflow run: ${{ github.run_id }}" \
                       -m "Note: rebased onto origin/main (attempt $attempt)"
          done

          echo "::error::Push still failing after 3 retries"
          exit 1

      - name: Trigger Netlify deploy (chain past GITHUB_TOKEN anti-recursion)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only fire deploy if the scan actually produced a new commit
          LATEST_MSG=$(git log -1 --format=%s)
          if [[ "$LATEST_MSG" == asm-scan:* ]]; then
            echo "Found scan commit on HEAD ($LATEST_MSG) — triggering deploy"
            gh workflow run deploy-netlify.yml
          else
            echo "No asm-scan commit on HEAD — skipping deploy trigger"
          fi

      - name: Summarize run
        if: always()
        run: |
          echo "## ASM scan summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Mode:** ${{ steps.targets.outputs.mode }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Assets scanned" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r tid; do
            [[ -z "$tid" ]] && continue
            FILE="data/assets/${tid}.json"
            if [[ -f "$FILE" ]]; then
              EXP=$(jq '.exposures | length' "$FILE" 2>/dev/null || echo "?")
              WATCH=$(jq '[.exposures[] | select(.severity=="watch")] | length' "$FILE" 2>/dev/null || echo "?")
              echo "- \`${tid}\` — ${EXP} exposure(s), **${WATCH}** watch-severity" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- \`${tid}\` — no output file (scan may have failed)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done < /tmp/scan_list

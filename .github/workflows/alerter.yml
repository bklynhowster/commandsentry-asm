name: Daily posture digest

# Runs once a day at 12:00 UTC = 07:00 ET (08:00 ET during EDT).
# Adjust the cron line if you want a different time. Cron uses UTC.
#
# Also runnable manually from the Actions tab via workflow_dispatch.
# dry_run=true is safe; it skips email + DB writes.
#
# Email transport: SendGrid (D-031, 2026-05-28 cutover). The legacy
# RESEND_API_KEY env var is still passed through for a transition
# period so the alerter's `SENDGRID_API_KEY or RESEND_API_KEY` fallback
# in run_alerter.py keeps working if SENDGRID_API_KEY isn't set.

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render but don't send / write"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'psycopg[binary]==3.3.4'

      - name: Run alerter
        env:
          SUPABASE_DSN:        ${{ secrets.SUPABASE_DSN }}
          # D-031 (2026-05-28): primary SendGrid API key, with the legacy
          # Resend key kept as fallback during the transition. The Python
          # script prefers SENDGRID_API_KEY when set.
          SENDGRID_API_KEY:    ${{ secrets.SENDGRID_API_KEY }}
          RESEND_API_KEY:      ${{ secrets.RESEND_API_KEY }}
          ALERTER_FROM:        ${{ vars.ALERTER_FROM       || 'CommandSentry@commandcompanies.com' }}
          ALERTER_FROM_NAME:   ${{ vars.ALERTER_FROM_NAME  || 'COMMANDsentry' }}
          ALERTER_TO:          ${{ vars.ALERTER_TO         || 'hschneider@commandcompanies.com,howiehow@mac.com' }}
          ALERTER_DASHBOARD_URL: ${{ vars.ALERTER_DASHBOARD_URL || 'https://supabase.com/dashboard/project/hdygktppfvuspnumpfuq' }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/alerter/run_alerter.py --dry-run
          else
            python scripts/alerter/run_alerter.py
          fi
